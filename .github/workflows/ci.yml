name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run linting
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser and accessibility tests
        run: npx playwright test

  terraform:
    name: Terraform (${{ matrix.configuration.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - name: bootstrap
            directory: infra/bootstrap
          - name: dev
            directory: infra/environments/dev
          - name: prod
            directory: infra/environments/prod

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Initialize Terraform
        working-directory: ${{ matrix.configuration.directory }}
        run: terraform init -backend=false -input=false

      - name: Validate Terraform
        working-directory: ${{ matrix.configuration.directory }}
        run: terraform validate -no-color
